  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

E7E1D3;  /* divisores suaves */\n  --linha:              #DAD3C2;  /* bordas */\n  --pedra-400:          #A89F8C;  /* texto auxiliar */\n  --pedra-600:          #6B6454;  /* texto secundário */\n  --tinta-suave:        #3A4232;  /* texto corpo sobre claro */\n  --tinta:              #1A2415;  /* texto título / quase-preto verde */\n  --branco:             #FFFFFF;\n\n  /* ---------- SEMÂNTICAS ---------- */\n  --sucesso:            #2A6318;\n  --atencao:            #E0A100;\n  --erro:               #C0341D;\n  --info:               #1E4A12;\n\n  /* ---------- TIPOGRAFIA ---------- */\n  --fonte:              'Montserrat', -apple-system, system-ui, sans-serif;\n\n  --peso-regular:       400;\n  --peso-medium:        500;\n  --peso-semibold:      600;\n  --peso-bold:          700;\n  --peso-extrabold:     800;\n\n  /* Escala tipográfica (1.250 — terça maior) */\n  --txt-xs:             0.75rem;   /* 12px — legendas, tags */\n  --txt-sm:             0.875rem;  /* 14px — apoio */\n  --txt-base:           1rem;      /* 16px — corpo */\n  --txt-md:             1.125rem;  /* 18px — corpo destaque */\n  --txt-lg:             1.5rem;    /* 24px — subtítulo */\n  --txt-xl:             2rem;      /* 32px — título seção */\n  --txt-2xl:            2.75rem;   /* 44px — título grande */\n  --txt-3xl:            3.75rem;   /* 60px — display */\n  --txt-4xl:            5rem;      /* 80px — hero */\n\n  --lh-tight:           1.05;\n  --lh-snug:            1.2;\n  --lh-normal:          1.55;\n  --ls-tight:           -0.02em;\n  --ls-wide:            0.08em;     /* labels caixa-alta */\n\n  /* ---------- ESPAÇAMENTO (base 4px) ---------- */\n  --e-1:  4px;   --e-2:  8px;   --e-3:  12px;  --e-4:  16px;\n  --e-5:  24px;  --e-6:  32px;  --e-7:  48px;  --e-8:  64px;\n  --e-9:  96px;  --e-10: 128px;\n\n  /* ---------- RAIOS ---------- */\n  --raio-sm:  6px;\n  --raio-md:  12px;\n  --raio-lg:  20px;\n  --raio-xl:  32px;\n  --raio-pill: 999px;\n\n  /* ---------- SOMBRAS ---------- */\n  --sombra-sm:  0 1px 2px rgba(26, 36, 21, 0.06), 0 1px 3px rgba(26, 36, 21, 0.08);\n  --sombra-md:  0 4px 12px rgba(26, 36, 21, 0.08), 0 2px 4px rgba(26, 36, 21, 0.06);\n  --sombra-lg:  0 12px 32px rgba(26, 36, 21, 0.12), 0 4px 8px rgba(26, 36, 21, 0.06);\n  --sombra-verde: 0 12px 28px rgba(22, 53, 11, 0.28);\n\n  /* ---------- TRANSIÇÕES ---------- */\n  --t-rapida: 140ms cubic-bezier(0.4, 0, 0.2, 1);\n  --t-media:  240ms cubic-bezier(0.4, 0, 0.2, 1);\n}\n<\u002Fstyle>\n<style>\n  *, *::before, *::after { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body {\n    margin: 0;\n    overflow-x: hidden;\n    font-family: var(--fonte);\n    color: var(--tinta);\n    background: var(--papel);\n    line-height: var(--lh-normal);\n    -webkit-font-smoothing: antialiased;\n  }\n  h1,h2,h3,h4 { margin: 0; line-height: var(--lh-snug); letter-spacing: var(--ls-tight); }\n  p { margin: 0; }\n  a { color: inherit; }\n\n  /* ---------- LAYOUT ---------- */\n  .app { display: grid; grid-template-columns: 264px 1fr; }\n  .nav {\n    position: sticky; top: 0; align-self: start; height: 100vh;\n    background: var(--verde-folha-800); color: #DCE9CF;\n    padding: var(--e-6) var(--e-5); overflow-y: auto;\n    display: flex; flex-direction: column; gap: var(--e-6);\n  }\n  .nav__brand { display: flex; flex-direction: column; gap: var(--e-3); }\n  .nav__brand img { width: 150px; }\n  .nav__tag { font-size: var(--txt-xs); letter-spacing: var(--ls-wide); text-transform: uppercase; color: var(--lima-400); font-weight: var(--peso-semibold); }\n  .nav__list { display: flex; flex-direction: column; gap: 2px; }\n  .nav__list a {\n    text-decoration: none; color: #BFD3AC; font-size: var(--txt-sm); font-weight: var(--peso-medium);\n    padding: var(--e-2) var(--e-3); border-radius: var(--raio-sm); transition: var(--t-rapida);\n  }\n  .nav__list a:hover { background: rgba(255,255,255,0.07); color: #fff; }\n  .nav__foot { margin-top: auto; font-size: var(--txt-xs); color: #7E9468; line-height: 1.6; }\n\n  .main { min-width: 0; }\n  section { padding: var(--e-9) var(--e-8); border-bottom: 1px solid var(--areia); scroll-margin-top: 0; }\n  @media (max-width: 1100px){ section { padding: var(--e-8) var(--e-6); } }\n\n  .eyebrow {\n    display: inline-flex; align-items: center; gap: var(--e-2);\n    font-size: var(--txt-xs); font-weight: var(--peso-bold); letter-spacing: var(--ls-wide);\n    text-transform: uppercase; color: var(--laranja-600); margin-bottom: var(--e-4);\n  }\n  .eyebrow::before { content:\"\"; width: 22px; height: 3px; background: var(--lima); border-radius: 2px; }\n  .sec-title { font-size: var(--txt-xl); font-weight: var(--peso-extrabold); margin-bottom: var(--e-3); }\n  .sec-lead { font-size: var(--txt-md); color: var(--tinta-suave); max-width: 60ch; margin-bottom: var(--e-7); }\n  .grid { display: grid; gap: var(--e-5); }\n  .grid > * { min-width: 0; }\n\n  /* ---------- HERO ---------- */\n  .hero {\n    background: var(--verde-folha-800);\n    color: #fff; padding: var(--e-10) var(--e-8);\n    position: relative; overflow: hidden; border-bottom: none;\n  }\n  .hero__swoosh { position: absolute; inset: 0; opacity: 0.08; pointer-events: none; }\n  .hero__swoosh svg { position: absolute; bottom: -40px; right: -120px; width: 900px; }\n  .hero__inner { position: relative; max-width: 880px; }\n  .hero img.mark { width: 280px; margin-bottom: var(--e-7); }\n  .hero h1 { font-size: var(--txt-3xl); font-weight: var(--peso-extrabold); margin-bottom: var(--e-5); }\n  .hero h1 em { font-style: normal; color: var(--lima-400); }\n  .hero__tag {\n    font-size: var(--txt-lg); color: #CFE0BD; font-weight: var(--peso-medium);\n    border-left: 4px solid var(--laranja); padding-left: var(--e-4); max-width: 48ch;\n  }\n  .hero__meta { display: flex; gap: var(--e-7); margin-top: var(--e-8); flex-wrap: wrap; }\n  .hero__meta div { display:flex; flex-direction:column; }\n  .hero__meta dt { font-size: var(--txt-xs); letter-spacing: var(--ls-wide); text-transform: uppercase; color: var(--lima-400); font-weight: var(--peso-bold); }\n  .hero__meta dd { margin: var(--e-1) 0 0; font-size: var(--txt-md); font-weight: var(--peso-semibold); color:#fff; }\n\n  /* ---------- CARDS / PANELS ---------- */\n  .panel { background: var(--branco); border: 1px solid var(--linha); border-radius: var(--raio-md); padding: var(--e-6); }\n  .muted { color: var(--pedra-600); }\n\n  /* ---------- LOGO SECTION ---------- */\n  .logo-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }\n  @media (max-width: 900px){ .logo-grid { grid-template-columns: 1fr 1fr; } }\n  .logo-card { border:1px solid var(--linha); border-radius: var(--raio-md); overflow: hidden; }\n  .logo-card--principal { border: 2px solid var(--lima); box-shadow: var(--sombra-md); }\n  .logo-card--principal .label { background: var(--lima-100); color: var(--verde-folha-700); }\n  .logo-card .stage { display:flex; align-items:center; justify-content:center; padding: var(--e-7); min-height: 150px; }\n  .logo-card .stage img { width: 70%; max-width: 220px; }\n  .logo-card .label { padding: var(--e-3) var(--e-4); border-top: 1px solid var(--linha); font-size: var(--txt-sm); font-weight: var(--peso-semibold); display:flex; justify-content:space-between; align-items:center; }\n  .logo-card .label span { font-weight: var(--peso-regular); color: var(--pedra-600); font-size: var(--txt-xs); }\n  .bg-papel { background: var(--papel); }\n  .bg-creme { background: var(--creme); }\n  .bg-verde { background: var(--verde-folha-800); }\n  .bg-laranja { background: var(--laranja); }\n\n  .misuse { grid-template-columns: repeat(4,minmax(0,1fr)); }\n  @media (max-width:900px){ .misuse { grid-template-columns:1fr 1fr; } }\n  .misuse .logo-card .stage { min-height: 120px; position: relative; }\n  .misuse .label { color: var(--erro); }\n  .misuse .label::before { content:\"✕\"; font-weight: var(--peso-bold); }\n\n  /* ---------- COLORS ---------- */\n  .swatches { grid-template-columns: repeat(3, minmax(0,1fr)); }\n  @media (max-width: 900px){ .swatches { grid-template-columns: 1fr; } }\n  .swatch { border-radius: var(--raio-md); overflow: hidden; border: 1px solid var(--linha); }\n  .swatch__chip { height: 150px; display: flex; align-items: flex-end; padding: var(--e-4); }\n  .swatch__chip b { font-size: var(--txt-md); font-weight: var(--peso-bold); }\n  .swatch__body { padding: var(--e-4); background: #fff; }\n  .swatch__body .name { font-weight: var(--peso-bold); font-size: var(--txt-base); }\n  .swatch__body .desc { font-size: var(--txt-sm); color: var(--pedra-600); margin-top: 2px; }\n  .swatch__body .hex { font-size: var(--txt-sm); font-weight: var(--peso-semibold); margin-top: var(--e-2); letter-spacing: 0.02em; }\n  .scale { display: flex; border-radius: var(--raio-sm); overflow: hidden; margin-top: var(--e-5); border:1px solid var(--linha); }\n  .scale span { flex:1; height: 56px; display:flex; align-items:flex-end; justify-content:center; padding-bottom:4px; font-size: 10px; font-weight: var(--peso-semibold); }\n  .neutrals { grid-template-columns: repeat(5,minmax(0,1fr)); margin-top: var(--e-5); }\n  @media (max-width:900px){ .neutrals { grid-template-columns: repeat(3,1fr);} }\n  .neutral { border:1px solid var(--linha); border-radius: var(--raio-sm); overflow:hidden; }\n  .neutral .c { height: 72px; }\n  .neutral .t { padding: var(--e-3); font-size: var(--txt-xs); }\n  .neutral .t b { display:block; font-size: var(--txt-sm); }\n\n  /* ---------- TYPE ---------- */\n  .type-row { display:flex; align-items:baseline; gap: var(--e-5); padding: var(--e-4) 0; border-bottom:1px solid var(--areia); }\n  .type-row .meta { width: 130px; flex:none; font-size: var(--txt-xs); color: var(--pedra-600); font-weight: var(--peso-semibold); }\n  .type-row .sample { color: var(--tinta); overflow: hidden; }\n  .weights { display:flex; flex-wrap:wrap; gap: var(--e-5); margin-top: var(--e-6); }\n  .weights div { font-size: var(--txt-2xl); }\n  .weights .lbl { font-size: var(--txt-xs); color: var(--pedra-600); font-weight: var(--peso-semibold); display:block; margin-top: var(--e-1); letter-spacing: var(--ls-wide); text-transform: uppercase; }\n\n  /* ---------- SPACING / RADII / SHADOW ---------- */\n  .triple { grid-template-columns: minmax(0,1fr) minmax(0,1fr) minmax(0,1fr); align-items:start; }\n  @media (max-width:900px){ .triple { grid-template-columns:1fr; } }\n  .space-row { display:flex; align-items:center; gap: var(--e-4); margin-bottom: var(--e-3); }\n  .space-row .bar { height: 14px; background: var(--lima); border-radius: 3px; }\n  .space-row .lbl { font-size: var(--txt-xs); color: var(--pedra-600); font-weight: var(--peso-semibold); width: 90px; }\n  .radii { display:flex; gap: var(--e-4); flex-wrap:wrap; }\n  .radii div { width: 84px; }\n  .radii .box { height: 64px; background: var(--verde-folha-600); }\n  .radii .lbl { font-size: var(--txt-xs); color: var(--pedra-600); margin-top: var(--e-2); font-weight: var(--peso-semibold); }\n  .shadows { display:flex; gap: var(--e-6); flex-wrap:wrap; }\n  .shadows div { width: 120px; height: 84px; background:#fff; border-radius: var(--raio-md); display:flex; align-items:flex-end; justify-content:center; padding-bottom: 8px; font-size: var(--txt-xs); color: var(--pedra-600); font-weight: var(--peso-semibold); }\n\n  /* ---------- BUTTONS ---------- */\n  .btn {\n    font-family: var(--fonte); font-weight: var(--peso-bold); font-size: var(--txt-base);\n    border: none; border-radius: var(--raio-pill); padding: 14px 28px; cursor: pointer;\n    display: inline-flex; align-items: center; gap: var(--e-2); transition: var(--t-media);\n    letter-spacing: 0.01em;\n  }\n  .btn--primary { background: var(--laranja); color: #fff; box-shadow: 0 6px 16px rgba(252,81,1,0.28); }\n  .btn--primary:hover { background: var(--laranja-600); transform: translateY(-1px); }\n  .btn--verde { background: var(--verde-folha-700); color: #fff; }\n  .btn--verde:hover { background: var(--verde-folha-600); }\n  .btn--ghost { background: transparent; color: var(--verde-folha-700); box-shadow: inset 0 0 0 2px var(--verde-folha-700); }\n  .btn--ghost:hover { background: var(--verde-folha-700); color:#fff; }\n  .btn--lima { background: var(--lima); color: var(--verde-folha-900); }\n  .btn--lima:hover { background: var(--lima-400); }\n  .btn--sm { padding: 9px 18px; font-size: var(--txt-sm); }\n  .btn-row { display:flex; gap: var(--e-4); flex-wrap:wrap; align-items:center; }\n\n  /* ---------- BADGES / TAGS ---------- */\n  .tags { display:flex; gap: var(--e-3); flex-wrap:wrap; align-items:center; }\n  .tag {\n    display:inline-flex; align-items:center; gap: 6px; font-size: var(--txt-xs);\n    font-weight: var(--peso-bold); letter-spacing: var(--ls-wide); text-transform: uppercase;\n    padding: 6px 12px; border-radius: var(--raio-pill);\n  }\n  .tag--origem { background: var(--lima-100); color: var(--verde-folha-700); }\n  .tag--origem::before { content:\"📍\"; }\n  .tag--safra { background: var(--laranja-100); color: var(--laranja-700); }\n  .tag--padrao { background: var(--verde-folha-800); color: var(--lima-400); }\n\n  /* ---------- PRODUCT CARD ---------- */\n  .prod-grid { grid-template-columns: repeat(3,minmax(0,1fr)); }\n  @media (max-width:900px){ .prod-grid { grid-template-columns:1fr 1fr; } }\n  @media (max-width:640px){ .prod-grid { grid-template-columns:1fr; } }\n  .prod {\n    background:#fff; border:1px solid var(--linha); border-radius: var(--raio-lg);\n    overflow:hidden; transition: var(--t-media);\n  }\n  .prod:hover { box-shadow: var(--sombra-lg); transform: translateY(-3px); }\n  .prod__img { height: 168px; display:flex; align-items:center; justify-content:center; font-size: 64px; position: relative; }\n  .prod__img .tag { position:absolute; top:12px; left:12px; }\n  .prod__b { padding: var(--e-5); }\n  .prod__b h4 { font-size: var(--txt-lg); font-weight: var(--peso-extrabold); }\n  .prod__b .sub { font-size: var(--txt-sm); color: var(--pedra-600); margin-top: 2px; }\n  .prod__b .meta { display:flex; gap: var(--e-4); margin-top: var(--e-4); font-size: var(--txt-xs); color: var(--tinta-suave); }\n  .prod__b .meta b { color: var(--verde-folha-700); }\n\n  /* ---------- STATS ---------- */\n  .stats { grid-template-columns: repeat(4,minmax(0,1fr)); }\n  @media (max-width:900px){ .stats { grid-template-columns:1fr 1fr; } }\n  .stat { padding: var(--e-5); border-left: 3px solid var(--lima); }\n  .stat .n { font-size: var(--txt-2xl); font-weight: var(--peso-extrabold); color: var(--verde-folha-700); letter-spacing: var(--ls-tight); }\n  .stat .l { font-size: var(--txt-sm); color: var(--pedra-600); font-weight: var(--peso-medium); margin-top: var(--e-1); }\n\n  /* ---------- FORM ---------- */\n  .field { display:flex; flex-direction:column; gap: var(--e-2); margin-bottom: var(--e-4); }\n  .field label { font-size: var(--txt-sm); font-weight: var(--peso-semibold); }\n  .field input, .field textarea, .field select {\n    font-family: var(--fonte); font-size: var(--txt-base); padding: 12px 14px;\n    border: 1.5px solid var(--linha); border-radius: var(--raio-sm); background:#fff; color: var(--tinta);\n    transition: var(--t-rapida);\n  }\n  .field input:focus, .field textarea:focus, .field select:focus { outline:none; border-color: var(--verde-folha-600); box-shadow: 0 0 0 3px var(--lima-100); }\n\n  /* ---------- ALERTS ---------- */\n  .alert { display:flex; gap: var(--e-3); padding: var(--e-4); border-radius: var(--raio-sm); font-size: var(--txt-sm); align-items:flex-start; margin-bottom: var(--e-3); }\n  .alert b { font-weight: var(--peso-bold); }\n  .alert--ok { background: var(--lima-100); color: var(--verde-folha-700); }\n  .alert--info { background: #E8EFE2; color: var(--verde-folha-700); }\n  .alert--warn { background: var(--laranja-100); color: var(--laranja-700); }\n\n  /* ---------- TONE OF VOICE ---------- */\n  .tov { grid-template-columns: repeat(3,minmax(0,1fr)); }\n  @media (max-width:900px){ .tov { grid-template-columns:1fr; } }\n  .tov .panel h4 { font-size: var(--txt-lg); font-weight: var(--peso-extrabold); color: var(--verde-folha-700); margin-bottom: var(--e-2); }\n  .tov .panel p { font-size: var(--txt-sm); color: var(--tinta-suave); }\n  .gloss { width:100%; border-collapse: collapse; margin-top: var(--e-5); }\n  .gloss th, .gloss td { text-align:left; padding: var(--e-3) var(--e-4); font-size: var(--txt-sm); border-bottom: 1px solid var(--areia); vertical-align: top; }\n  .gloss th { font-size: var(--txt-xs); text-transform:uppercase; letter-spacing: var(--ls-wide); color: var(--pedra-600); }\n  .gloss .yes { color: var(--verde-folha-700); font-weight: var(--peso-semibold); }\n  .gloss .no { color: var(--erro); text-decoration: line-through; text-decoration-thickness: 1px; }\n  .msg { background: var(--verde-folha-800); color:#E8F0DF; border-radius: var(--raio-md); padding: var(--e-5); font-size: var(--txt-base); line-height: 1.6; }\n  .msg .ch { font-size: var(--txt-xs); text-transform:uppercase; letter-spacing: var(--ls-wide); color: var(--lima-400); font-weight: var(--peso-bold); display:block; margin-bottom: var(--e-2); }\n\n  /* ---------- MOCK HEADER & FOOTER ---------- */\n  .mock-head { background:#fff; border:1px solid var(--linha); border-radius: var(--raio-md); padding: var(--e-4) var(--e-5); display:flex; align-items:center; justify-content:space-between; }\n  .mock-head img { width: 124px; }\n  .mock-head nav { display:flex; gap: var(--e-5); font-size: var(--txt-sm); font-weight: var(--peso-semibold); }\n  .mock-head nav a { text-decoration:none; color: var(--tinta-suave); }\n  .mock-head nav a:hover { color: var(--laranja-600); }\n  .mock-foot { background: var(--verde-folha-800); color:#BFD3AC; border-radius: var(--raio-md); padding: var(--e-7); margin-top: var(--e-5); }\n  .mock-foot img { width: 150px; margin-bottom: var(--e-4); }\n  .mock-foot .cols { display:flex; gap: var(--e-8); flex-wrap:wrap; }\n  .mock-foot h5 { color: var(--lima-400); font-size: var(--txt-xs); text-transform:uppercase; letter-spacing: var(--ls-wide); margin: 0 0 var(--e-3); }\n  .mock-foot p, .mock-foot a { font-size: var(--txt-sm); line-height: 1.9; text-decoration:none; color:#BFD3AC; display:block; }\n\n  .swoosh-demo { display:flex; gap: var(--e-6); align-items:center; flex-wrap:wrap; }\n  .swoosh-demo .panel { flex:1; min-width: 260px; }\n  code { background: var(--creme); padding: 2px 7px; border-radius: 5px; font-size: 0.85em; font-family: ui-monospace, monospace; color: var(--verde-folha-700); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"app\">\n  <!-- NAV -->\n  <aside class=\"nav\">\n    <div class=\"nav__brand\">\n      <img src=\"c73e7e40-806f-4707-9bf1-0e4c4ae0f6c6\" alt=\"Frutas Beca\">\n      <span class=\"nav__tag\">Design System<\u002Fspan>\n    <\u002Fdiv>\n    <nav class=\"nav__list\">\n      <a href=\"#marca\">Fundamentos da marca<\u002Fa>\n      <a href=\"#logo\">Logo<\u002Fa>\n      <a href=\"#cores\">Cores<\u002Fa>\n      <a href=\"#tipografia\">Tipografia<\u002Fa>\n      <a href=\"#layout\">Espaço, raio &amp; sombra<\u002Fa>\n      <a href=\"#botoes\">Botões<\u002Fa>\n      <a href=\"#tags\">Tags &amp; badges<\u002Fa>\n      <a href=\"#produtos\">Cards de produto<\u002Fa>\n      <a href=\"#dados\">Números &amp; formulário<\u002Fa>\n      <a href=\"#estrutura\">Header &amp; footer<\u002Fa>\n      <a href=\"#voz\">Tom de voz<\u002Fa>\n      <a href=\"#grafismo\">Grafismo<\u002Fa>\n    <\u002Fnav>\n    <p class=\"nav__foot\">Frutas Beca · desde 1982<br>Qualidade de quem produz,<br>confiança de quem entrega.<\u002Fp>\n  <\u002Faside>\n\n  <main class=\"main\">\n    <!-- HERO -->\n    <header class=\"hero\">\n      <div class=\"hero__swoosh\">\n        <svg viewBox=\"0 0 940 360\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M114 253C-26 193 -9 123 21 87C-67 288 673 322 940 182C659 341 256 312 114 253Z\" fill=\"#A6D40A\"><\u002Fpath><path d=\"M94 191C37 162 -31 90 98 28C-74 158 236 262 698 219C359 288 152 220 94 191Z\" fill=\"#A6D40A\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"hero__inner\">\n        <img class=\"mark\" src=\"c73e7e40-806f-4707-9bf1-0e4c4ae0f6c6\" alt=\"Frutas Beca\">\n        <h1>O sistema visual da <em>solidez<\u002Fem> e da <em>confiança<\u002Fem>.<\u002Fh1>\n        <p class=\"hero__tag\">A solidez da tradição com a inteligência do fornecimento moderno.<\u002Fp>\n        <dl class=\"hero__meta\">\n          <div><dt>Setor<\u002Fdt><dd>Abastecimento de hortifruti · B2B<\u002Fdd><\u002Fdiv>\n          <div><dt>Desde<\u002Fdt><dd>1982 · 3ª geração<\u002Fdd><\u002Fdiv>\n          <div><dt>Tipografia<\u002Fdt><dd>Montserrat<\u002Fdd><\u002Fdiv>\n        <\u002Fdl>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- FUNDAMENTOS -->\n    <section id=\"marca\">\n      <span class=\"eyebrow\">Fundamentos<\u002Fspan>\n      <h2 class=\"sec-title\">A marca em uma frase<\u002Fh2>\n      <p class=\"sec-lead\">Tudo neste sistema serve a um único objetivo: transmitir <b>tranquilidade<\u002Fb>. Somos a marca que o empresário escolhe quando precisa de um fornecimento que não falha.<\u002Fp>\n      <div class=\"grid triple\">\n        <div class=\"panel\">\n          <h3 style=\"font-size:var(--txt-md);color:var(--verde-folha-700);margin-bottom:var(--e-2)\">Propósito<\u002Fh3>\n          <p class=\"muted\" style=\"font-size:var(--txt-sm)\">Garantir que o melhor da nossa terra chegue com força e qualidade à mesa do brasileiro, fortalecendo o negócio de cada parceiro.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"panel\">\n          <h3 style=\"font-size:var(--txt-md);color:var(--verde-folha-700);margin-bottom:var(--e-2)\">Diferencial<\u002Fh3>\n          <p class=\"muted\" style=\"font-size:var(--txt-sm)\">Pé no chão e olho no olho há mais de 40 anos. Parceria direta com produtores de GO, SP, MG, BA e SE.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"panel\">\n          <h3 style=\"font-size:var(--txt-md);color:var(--verde-folha-700);margin-bottom:var(--e-2)\">Para quem<\u002Fh3>\n          <p class=\"muted\" style=\"font-size:var(--txt-sm)\">Redes de supermercados, feirantes e estabelecimentos que precisam de volume, pontualidade e padrão.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- LOGO -->\n    <section id=\"logo\">\n      <span class=\"eyebrow\">Identidade<\u002Fspan>\n      <h2 class=\"sec-title\">Logo<\u002Fh2>\n      <p class=\"sec-lead\">O wordmark une <b>Frutas<\u002Fb> em verde-lima e <b>Beca<\u002Fb> em laranja, assentados sobre o grafismo de folha. A aplicação principal é a <b>colorida sobre o verde-folha<\u002Fb> — a base institucional da marca.<\u002Fp>\n      <div class=\"grid logo-grid\">\n        <div class=\"logo-card logo-card--principal\"><div class=\"stage bg-verde\"><img src=\"c73e7e40-806f-4707-9bf1-0e4c4ae0f6c6\" alt=\"\"><\u002Fdiv><div class=\"label\">Principal <span>sobre verde-folha<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"logo-card\"><div class=\"stage bg-papel\"><img src=\"c73e7e40-806f-4707-9bf1-0e4c4ae0f6c6\" alt=\"\"><\u002Fdiv><div class=\"label\">Secundária <span>fundo claro<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"logo-card\"><div class=\"stage bg-verde\"><img src=\"79801c51-61a7-4bad-9a02-e4f71124b838\" alt=\"\"><\u002Fdiv><div class=\"label\">Monocromático <span>branco<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"logo-card\"><div class=\"stage bg-papel\"><img src=\"36558043-4fe0-4f85-9201-984220f2d7d0\" alt=\"\"><\u002Fdiv><div class=\"label\">Monocromático <span>verde-folha<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"logo-card\"><div class=\"stage bg-creme\"><img src=\"d89000db-4080-4815-ba45-25e70163a53a\" style=\"width:130px\" alt=\"\"><\u002Fdiv><div class=\"label\">Selo / avatar <span>quadrado<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"logo-card\"><div class=\"stage bg-laranja\"><img src=\"79801c51-61a7-4bad-9a02-e4f71124b838\" alt=\"\"><\u002Fdiv><div class=\"label\">Sobre laranja <span>branco<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 style=\"font-size:var(--txt-lg);font-weight:var(--peso-bold);margin:var(--e-8) 0 var(--e-4)\">Área de proteção &amp; tamanho mínimo<\u002Fh3>\n      <div class=\"grid triple\">\n        <div class=\"panel\" style=\"display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(45deg,#F3EFE6,#F3EFE6 8px,#fff 8px,#fff 16px)\">\n          <div style=\"background:#fff;padding:24px;border:1px dashed var(--laranja);border-radius:8px;max-width:100%\"><img src=\"c73e7e40-806f-4707-9bf1-0e4c4ae0f6c6\" style=\"width:140px;max-width:100%;display:block\" alt=\"\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"panel\">\n          <h4 style=\"font-size:var(--txt-base);margin-bottom:var(--e-2)\">Respiro mínimo<\u002Fh4>\n          <p class=\"muted\" style=\"font-size:var(--txt-sm)\">Nenhum elemento gráfico ou texto deve invadir o espaço equivalente à <b>altura da letra “B”<\u002Fb> ao redor do logo.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"panel\">\n          <h4 style=\"font-size:var(--txt-base);margin-bottom:var(--e-2)\">Tamanho mínimo<\u002Fh4>\n          <p class=\"muted\" style=\"font-size:var(--txt-sm)\">Impressão: <b>30&nbsp;mm<\u002Fb> de largura.<br>Digital: <b>120&nbsp;px<\u002Fb> de largura. Abaixo disso a leitura do wordmark fica comprometida.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 style=\"font-size:var(--txt-lg);font-weight:var(--peso-bold);margin:var(--e-8) 0 var(--e-4)\">Usos incorretos<\u002Fh3>\n      <div class=\"grid misuse\">\n        <div class=\"logo-card\"><div class=\"stage bg-papel\"><img src=\"c73e7e40-806f-4707-9bf1-0e4c4ae0f6c6\" style=\"transform:rotate(-10deg)\" alt=\"\"><\u002Fdiv><div class=\"label\">Não girar<\u002Fdiv><\u002Fdiv>\n        <div class=\"logo-card\"><div class=\"stage bg-papel\"><img src=\"c73e7e40-806f-4707-9bf1-0e4c4ae0f6c6\" style=\"transform:scaleY(1.6);width:50%\" alt=\"\"><\u002Fdiv><div class=\"label\">Não distorcer<\u002Fdiv><\u002Fdiv>\n        <div class=\"logo-card\"><div class=\"stage\" style=\"background:#7a1fb0\"><img src=\"c73e7e40-806f-4707-9bf1-0e4c4ae0f6c6\" alt=\"\"><\u002Fdiv><div class=\"label\">Fora da paleta<\u002Fdiv><\u002Fdiv>\n        <div class=\"logo-card\"><div class=\"stage\" style=\"background:linear-gradient(45deg,#888,#ccc)\"><img src=\"c73e7e40-806f-4707-9bf1-0e4c4ae0f6c6\" alt=\"\"><\u002Fdiv><div class=\"label\">Sem contraste<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CORES -->\n    <section id=\"cores\">\n      <span class=\"eyebrow\">Cores<\u002Fspan>\n      <h2 class=\"sec-title\">Paleta<\u002Fh2>\n      <p class=\"sec-lead\">Verde e laranja: a combinação que representa o universo das frutas frescas. O <b>verde-folha é a cor primária<\u002Fb> — a superfície institucional padrão da marca; o <b>laranja<\u002Fb> é a ação; o <b>lima<\u002Fb> traz frescor e é a base do grafismo.<\u002Fp>\n      <div class=\"grid swatches\">\n        <div class=\"swatch\">\n          <div class=\"swatch__chip\" style=\"background:var(--verde-folha-800)\"><b style=\"color:var(--lima-400)\">Aa<\u002Fb><\u002Fdiv>\n          <div class=\"swatch__body\"><div class=\"name\">Verde Folha <span style=\"font-size:var(--txt-xs);font-weight:700;color:var(--laranja-600);text-transform:uppercase;letter-spacing:var(--ls-wide)\">· Primária<\u002Fspan><\u002Fdiv><div class=\"desc\">Cor da marca · superfície institucional padrão<\u002Fdiv><div class=\"hex\">#16350B<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"swatch\">\n          <div class=\"swatch__chip\" style=\"background:var(--laranja)\"><b style=\"color:#fff\">Aa<\u002Fb><\u002Fdiv>\n          <div class=\"swatch__body\"><div class=\"name\">Laranja Beca<\u002Fdiv><div class=\"desc\">Ação · CTAs · energia<\u002Fdiv><div class=\"hex\">#FC5101<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"swatch\">\n          <div class=\"swatch__chip\" style=\"background:var(--lima)\"><b style=\"color:var(--verde-folha-900)\">Aa<\u002Fb><\u002Fdiv>\n          <div class=\"swatch__body\"><div class=\"name\">Verde Lima<\u002Fdiv><div class=\"desc\">Frescor · destaques · grafismo<\u002Fdiv><div class=\"hex\">#A6D40A<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 style=\"font-size:var(--txt-base);font-weight:var(--peso-bold);margin:var(--e-7) 0 0\">Escalas tonais<\u002Fh3>\n      <div class=\"scale\">\n        <span style=\"background:var(--verde-folha-900);color:#fff\">900<\u002Fspan>\n        <span style=\"background:var(--verde-folha-800);color:#fff\">800<\u002Fspan>\n        <span style=\"background:var(--verde-folha-700);color:#fff\">700<\u002Fspan>\n        <span style=\"background:var(--verde-folha-600);color:#fff\">600<\u002Fspan>\n        <span style=\"background:var(--verde-folha-500);color:#fff\">500<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"scale\">\n        <span style=\"background:var(--laranja-700);color:#fff\">700<\u002Fspan>\n        <span style=\"background:var(--laranja-600);color:#fff\">600<\u002Fspan>\n        <span style=\"background:var(--laranja-500);color:#fff\">500<\u002Fspan>\n        <span style=\"background:var(--laranja-400);color:#fff\">400<\u002Fspan>\n        <span style=\"background:var(--laranja-300);color:var(--tinta)\">300<\u002Fspan>\n        <span style=\"background:var(--laranja-100);color:var(--laranja-700)\">100<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"scale\">\n        <span style=\"background:var(--lima-700);color:#fff\">700<\u002Fspan>\n        <span style=\"background:var(--lima-600);color:#fff\">600<\u002Fspan>\n        <span style=\"background:var(--lima-500);color:var(--verde-folha-900)\">500<\u002Fspan>\n        <span style=\"background:var(--lima-400);color:var(--verde-folha-900)\">400<\u002Fspan>\n        <span style=\"background:var(--lima-100);color:var(--lima-700)\">100<\u002Fspan>\n      <\u002Fdiv>\n\n      <h3 style=\"font-size:var(--txt-base);font-weight:var(--peso-bold);margin:var(--e-7) 0 0\">Neutros quentes<\u002Fh3>\n      <div class=\"grid neutrals\">\n        <div class=\"neutral\"><div class=\"c\" style=\"background:var(--papel)\"><\u002Fdiv><div class=\"t\"><b>Papel<\u002Fb>#FAF9F5<\u002Fdiv><\u002Fdiv>\n        <div class=\"neutral\"><div class=\"c\" style=\"background:var(--creme)\"><\u002Fdiv><div class=\"t\"><b>Creme<\u002Fb>#F3EFE6<\u002Fdiv><\u002Fdiv>\n        <div class=\"neutral\"><div class=\"c\" style=\"background:var(--linha)\"><\u002Fdiv><div class=\"t\"><b>Linha<\u002Fb>#DAD3C2<\u002Fdiv><\u002Fdiv>\n        <div class=\"neutral\"><div class=\"c\" style=\"background:var(--pedra-600)\"><\u002Fdiv><div class=\"t\" style=\"color:#fff\"><b>Pedra<\u002Fb>#6B6454<\u002Fdiv><\u002Fdiv>\n        <div class=\"neutral\"><div class=\"c\" style=\"background:var(--tinta)\"><\u002Fdiv><div class=\"t\" style=\"color:#fff\"><b>Tinta<\u002Fb>#1A2415<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- TIPOGRAFIA -->\n    <section id=\"tipografia\">\n      <span class=\"eyebrow\">Tipografia<\u002Fspan>\n      <h2 class=\"sec-title\">Montserrat<\u002Fh2>\n      <p class=\"sec-lead\">Sem serifa, moderna e altamente legível. <b>Bold / ExtraBold<\u002Fb> em títulos e destaques; <b>Regular / Medium<\u002Fb> em textos corridos.<\u002Fp>\n      <div class=\"panel\">\n        <div class=\"type-row\"><div class=\"meta\">Hero · 800 · 60px<\u002Fdiv><div class=\"sample\" style=\"font-size:var(--txt-3xl);font-weight:800\">Do campo ao seu mercado<\u002Fdiv><\u002Fdiv>\n        <div class=\"type-row\"><div class=\"meta\">Título · 800 · 44px<\u002Fdiv><div class=\"sample\" style=\"font-size:var(--txt-2xl);font-weight:800\">Abastecimento que não falha<\u002Fdiv><\u002Fdiv>\n        <div class=\"type-row\"><div class=\"meta\">Seção · 700 · 32px<\u002Fdiv><div class=\"sample\" style=\"font-size:var(--txt-xl);font-weight:700\">Parceria de verdade<\u002Fdiv><\u002Fdiv>\n        <div class=\"type-row\"><div class=\"meta\">Subtítulo · 600 · 24px<\u002Fdiv><div class=\"sample\" style=\"font-size:var(--txt-lg);font-weight:600\">Direto dos principais polos do país<\u002Fdiv><\u002Fdiv>\n        <div class=\"type-row\"><div class=\"meta\">Corpo · 400 · 16px<\u002Fdiv><div class=\"sample\" style=\"font-size:var(--txt-base);font-weight:400\">Entregamos frutas selecionadas através de uma operação robusta e inteligente, que une a confiança da tradição à agilidade do mercado moderno.<\u002Fdiv><\u002Fdiv>\n        <div class=\"type-row\" style=\"border:none\"><div class=\"meta\">Label · 700 · 12px<\u002Fdiv><div class=\"sample\" style=\"font-size:var(--txt-xs);font-weight:700;letter-spacing:var(--ls-wide);text-transform:uppercase;color:var(--laranja-600)\">Padrão selecionado<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"weights\">\n        <div style=\"font-weight:400\">Aa<span class=\"lbl\">Regular 400<\u002Fspan><\u002Fdiv>\n        <div style=\"font-weight:500\">Aa<span class=\"lbl\">Medium 500<\u002Fspan><\u002Fdiv>\n        <div style=\"font-weight:600\">Aa<span class=\"lbl\">SemiBold 600<\u002Fspan><\u002Fdiv>\n        <div style=\"font-weight:700\">Aa<span class=\"lbl\">Bold 700<\u002Fspan><\u002Fdiv>\n        <div style=\"font-weight:800\">Aa<span class=\"lbl\">ExtraBold 800<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- LAYOUT -->\n    <section id=\"layout\">\n      <span class=\"eyebrow\">Base<\u002Fspan>\n      <h2 class=\"sec-title\">Espaço, raio &amp; sombra<\u002Fh2>\n      <p class=\"sec-lead\">Espaçamento em grade de <b>4px<\u002Fb>. Cantos arredondados generosos para um tom acolhedor sem perder a solidez.<\u002Fp>\n      <div class=\"grid triple\">\n        <div class=\"panel\">\n          <h4 style=\"font-size:var(--txt-base);margin-bottom:var(--e-4)\">Espaçamento<\u002Fh4>\n          <div class=\"space-row\"><span 002Fdiv>\n    <\u002Fsection>\n\n    <!-- GRAFISMO -->\n    <section id=\"grafismo\" style=\"border-bottom:none\">\n      <span class=\"eyebrow\">Grafismo<\u002Fspan>\n      <h2 class=\"sec-title\">O elemento de folha<\u002Fh2>\n      <p class=\"sec-lead\">As duas curvas verdes do logo são o nosso grafismo de apoio: evocam folha, movimento e a estrada do campo ao mercado. Use como assinatura sutil em rodapés, divisores e fundos.<\u002Fp>\n      <div class=\"swoosh-demo\">\n        <div class=\"panel bg-verde\" style=\"position:relative;overflow:hidden;min-height:160px;display:flex;align-items:center;justify-content:center\">\n          <svg viewBox=\"0 0 940 360\" style=\"position:absolute;width:120%;opacity:.5;bottom:-30px\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M114 253C-26 193 -9 123 21 87C-67 288 673 322 940 182C659 341 256 312 114 253Z\" fill=\"#A6D40A\"><\u002Fpath><\u002Fsvg>\n          <span style=\"position:relative;color:#fff;font-weight:700;font-size:var(--txt-lg)\">Fundo com grafismo<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"panel\" style=\"min-height:160px;display:flex;flex-direction:column;justify-content:center;gap:var(--e-3)\">\n          <svg viewBox=\"0 0 940 200\" style=\"width:100%;height:40px\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M0 120C200 40 740 40 940 120\" stroke=\"#A6D40A\" stroke-width=\"14\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <p class=\"muted\" style=\"font-size:var(--txt-sm)\">Divisor de folha entre seções<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
